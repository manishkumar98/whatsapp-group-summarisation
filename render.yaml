services:
  - type: web
    name: whatsapp-group-summarisation
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PERISKOPE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PHONE_NUMBER
        sync: false
